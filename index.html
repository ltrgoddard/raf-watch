<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAF WATCH - UK Royal Air Force flight tracker</title>
  <link href="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.css" rel="stylesheet">
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/7/71/Roundel_of_the_United_Kingdom.svg" type="image/svg+xml">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div id="map"></div>
  <div id="panel" class="panel glass">
    <h1><a href="https://github.com/ltrgoddard/raf-watch" target="_blank">RAF<span class="title-watch">WATCH</span></a></h1>
    <p class="subtitle">Interactive map of UK Royal Air Force activity, based on ICAO hex codes from <a href="https://live-mobile-mode-s.eu/overviewall.php?DGCountry=UK#google_vignette" target="_blank">live-military-mode-s.eu</a> and updated daily with transponder data from <a href="https://globe.adsbexchange.com/" target="_blank">ADS-B Exchange</a>.</p>
    <p class="subtitle">This map does not facilitate live tracking.</p>
  </div>
  <div id="legend" class="panel glass">
    <h4>Aircraft type</h4>
    <div id="legend-items"></div>
  </div>
  <div id="date-slider" class="panel glass">
    <input type="range" id="slider" min="0" max="0" value="0">
    <div id="slider-labels"></div>
  </div>
  <div id="tooltip" class="glass"></div>
  <script src="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
