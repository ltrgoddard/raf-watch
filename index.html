<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAF flight tracker</title>
  <link href="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div id="map"></div>
  <div id="panel" class="panel glass">
    <h1>RAF flight tracker</h1>
    <p id="subtitle">Interactive map of UK Royal Air Force activity based on data from <a href="https://live-mobile-mode-s.eu/overviewall.php?DGCountry=UK#google_vignette" target="_blank">live-military-mode-s.eu</a> and <a href="https://globe.adsbexchange.com/" target="_blank">ADS-B Exchange</a></p>
  </div>
  <div id="legend" class="panel glass">
    <h4>Aircraft type</h4>
    <div id="legend-items"></div>
  </div>
  <div id="date-slider" class="panel glass">
    <input type="range" id="slider" min="0" max="0" value="0">
    <div id="slider-labels"></div>
  </div>
  <div id="tooltip" class="glass"></div>
  <script src="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
